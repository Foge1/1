name: Android build setup
description: Common Android CI setup (JDK, Android SDK, Gradle cache, gradlew permissions)

runs:
  using: composite
  steps:
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Set up Android SDK packages
      uses: android-actions/setup-android@v3
      with:
        packages: |
          platform-tools
          platforms;android-34
          build-tools;34.0.0

    - name: Ensure Android SDK licenses are accepted (non-interactive)
      shell: bash
      run: yes | sdkmanager --sdk_root="${ANDROID_SDK_ROOT}" --licenses >/dev/null

    - name: Verify required Android SDK packages
      shell: bash
      run: |
        sdkmanager --sdk_root="${ANDROID_SDK_ROOT}" --list_installed | sed -n '1,160p'

    - name: Grant execute permission for gradlew
      shell: bash
      run: chmod +x gradlew
