build:
  maxIssues: 0
  weights:
    complexity: 2
    comments: 2
    style: 1

config:
  validation: true

comments:
  active: true
  ForbiddenComment:
    active: true
    comments:
      - 'TODO:'
      - 'FIXME:'

complexity:
  active: true
  CyclomaticComplexMethod:
    active: true
    threshold: 20
  LongMethod:
    active: true
    threshold: 120

style:
  active: true
  UnusedImports:
    active: true
  UnusedPrivateMember:
    active: true
