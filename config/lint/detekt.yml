build:
  maxIssues: 0

config:
  validation: true
  warningsAsErrors: false

processors:
  active: true

console-reports:
  active: true

comments:
  active: false

output-reports:
  active: true

complexity:
  active: true
  CognitiveComplexMethod:
    active: true
    threshold: 18
  CyclomaticComplexMethod:
    active: true
    threshold: 20
  LongMethod:
    active: true
    threshold: 140
  LongParameterList:
    active: true
    functionThreshold: 10
    constructorThreshold: 12
    ignoreDefaultParameters: true
  NestedBlockDepth:
    active: true
    threshold: 4
  TooManyFunctions:
    active: true
    thresholdInClasses: 20
    thresholdInObjects: 20
    thresholdInInterfaces: 25
    thresholdInFiles: 25

coroutines:
  active: true
  GlobalCoroutineUsage:
    active: true
  InjectDispatcher:
    active: true
  RedundantSuspendModifier:
    active: true
  SleepInsteadOfDelay:
    active: true

empty-blocks:
  active: false

exceptions:
  active: true
  SwallowedException:
    active: true
  TooGenericExceptionCaught:
    active: true
  TooGenericExceptionThrown:
    active: true

naming:
  active: false

performance:
  active: true

potential-bugs:
  active: true
  ImplicitDefaultLocale:
    active: false
  NullableToStringCall:
    active: true
  UnnecessarySafeCall:
    active: true
  UnsafeCast:
    active: true

style:
  active: true
  MagicNumber:
    active: false
  WildcardImport:
    active: false
  ReturnCount:
    active: false
  ThrowsCount:
    active: false
  MaxLineLength:
    active: false
  NewLineAtEndOfFile:
    active: false
  BracesOnIfStatements:
    active: false
    singleLine: "never"
    multiLine: "always"
  UnusedPrivateMember:
    active: true
