build:
  maxIssues: 0

config:
  validation: true
  warningsAsErrors: false

processors:
  active: true

console-reports:
  active: true

output-reports:
  active: true

complexity:
  active: true
  CyclomaticComplexMethod:
    active: true
    threshold: 18
  LongMethod:
    active: true
    threshold: 90
  LongParameterList:
    active: true
    functionThreshold: 8
    constructorThreshold: 9
    ignoreDefaultParameters: true
  NestedBlockDepth:
    active: true
    threshold: 5
  TooManyFunctions:
    active: false

coroutines:
  active: true
  GlobalCoroutineUsage:
    active: true
  InjectDispatcher:
    active: true
  RedundantSuspendModifier:
    active: true
  SleepInsteadOfDelay:
    active: true

empty-blocks:
  active: true

exceptions:
  active: true

naming:
  active: false

performance:
  active: true

potential-bugs:
  active: true

style:
  active: true
  MagicNumber:
    active: false
  WildcardImport:
    active: false
  ReturnCount:
    active: false
  ThrowsCount:
    active: false
  MaxLineLength:
    active: false
  NewLineAtEndOfFile:
    active: false
  MandatoryBracesIfStatements:
    active: false

formatting:
  active: false
