// Top-level build file where you can add configuration options common to all sub-projects/modules.
plugins {
    id 'base'
    id 'com.android.application' version '8.1.2' apply false
    id 'com.android.library' version '8.1.2' apply false
    id 'org.jetbrains.kotlin.android' version '1.9.23' apply false
    id 'com.google.dagger.hilt.android' version '2.48' apply false
    id 'io.gitlab.arturbosch.detekt' version '1.23.6' apply false
    id 'org.jlleitschuh.gradle.ktlint' version '12.1.1' apply false
}

def detektVersion = '1.23.6'

ext {
    versions = [
            coreKtx              : '1.12.0',
            lifecycle            : '2.6.2',
            activityCompose      : '1.8.1',
            composeBom           : '2024.06.00',
            navigationCompose    : '2.7.7',
            room                 : '2.6.0',
            coroutines           : '1.7.3',
            datastore            : '1.0.0',
            hilt                 : '2.48',
            hiltNavigationCompose: '1.1.0',
            desugar              : '2.1.5',
            junit4               : '4.13.2',
            androidxJunit        : '1.1.5',
            espresso             : '3.5.1',
            sentry               : '7.8.0'
    ]
}


subprojects { subproject ->
    plugins.withId("org.jetbrains.kotlin.android") {
        subproject.apply plugin: "io.gitlab.arturbosch.detekt"
        subproject.apply plugin: "org.jlleitschuh.gradle.ktlint"

        subproject.detekt {
            toolVersion = detektVersion
            config.setFrom(rootProject.files("$rootDir/config/detekt/detekt.yml"))
            baseline = subproject.file("detekt-baseline.xml")
            buildUponDefaultConfig = false
            allRules = false
            parallel = true
            ignoreFailures = false
        }

        subproject.dependencies {
            detektPlugins("io.gitlab.arturbosch.detekt:detekt-formatting:${detektVersion}")
        }

        subproject.tasks.withType(io.gitlab.arturbosch.detekt.Detekt).configureEach {
            jvmTarget = "17"
            reports {
                html.required.set(true)
                xml.required.set(true)
                txt.required.set(false)
                sarif.required.set(false)
                md.required.set(false)
            }
        }

        subproject.ktlint {
            version.set("1.3.1")
            android.set(true)
            ignoreFailures.set(false)
            outputToConsole.set(true)
            filter {
                exclude("**/generated/**")
                exclude("**/build/**")
            }
        }
    }
}

def kotlinAndroidModulePaths = [":app", ":core", ":feature-orders"]

tasks.register("detektAll") {
    group = "verification"
    description = "Runs detekt on all Kotlin Android modules."
    dependsOn(kotlinAndroidModulePaths.collect { "${it}:detekt" })
}

tasks.register("ktlintCheck") {
    group = "verification"
    description = "Runs ktlint checks on all Kotlin Android modules."
    dependsOn(kotlinAndroidModulePaths.collect { "${it}:ktlintCheck" })
}

tasks.register("ktlintFormat") {
    group = "formatting"
    description = "Formats Kotlin code style issues with ktlint in all Kotlin Android modules."
    dependsOn(kotlinAndroidModulePaths.collect { "${it}:ktlintFormat" })
}

tasks.named("check") {
    dependsOn("detektAll", "ktlintCheck")
}
